<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>FastFit</title>
    <meta name="theme-color" content="#0a0a0c" />
    <!-- PWA: hace la app instalable -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FastFit" />
    <meta name="mobile-web-app-capable" content="yes" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap');
      *{box-sizing:border-box;margin:0;padding:0;}
      html,body,#root{background:#0a0a0c;min-height:100vh;color:#ededf0;font-family:'Syne',sans-serif;-webkit-font-smoothing:antialiased;}
      input,textarea{font-family:inherit;background:#16161a;border:1px solid #26262c;border-radius:10px;color:#ededf0;outline:none;transition:border-color .15s;width:100%;padding:12px 14px;font-size:14px;}
      input:focus,textarea:focus{border-color:#3457e8;}
      input::placeholder,textarea::placeholder{color:#44444d;}
      button{font-family:inherit;cursor:pointer;transition:all .15s;border:none;}
      textarea{resize:vertical;}
      ::-webkit-scrollbar{width:4px;height:4px;}
      ::-webkit-scrollbar-thumb{background:#33333a;border-radius:2px;}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
      @keyframes medalPop{0%{transform:scale(0) rotate(-180deg);opacity:0}60%{transform:scale(1.25) rotate(10deg)}100%{transform:scale(1) rotate(0);opacity:1}}
      @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
      .fu{animation:fadeUp .3s ease both;}
      .app-shell{width:100%;min-height:100vh;margin:0 auto;position:relative;background:#0a0a0c;}
      .sidebar{display:none;}
      .main-content{width:100%;}
      @media(min-width:520px) and (max-width:899px){
        body{background:#060608;}
        .app-shell{max-width:480px;border-left:1px solid #26262c;border-right:1px solid #26262c;box-shadow:0 0 50px rgba(0,0,0,0.5);}
        .nav-shell{max-width:478px !important;left:50% !important;transform:translateX(-50%);}
        .chat-input-bar{max-width:480px;left:50%;transform:translateX(-50%);}
      }
      @media(min-width:900px){
        .app-shell{max-width:none;display:flex;}
        .sidebar{display:flex;flex-direction:column;width:232px;position:fixed;left:0;top:0;bottom:0;border-right:1px solid #26262c;padding:30px 14px;background:#101013;z-index:200;}
        .main-content{margin-left:232px;width:calc(100% - 232px);max-width:820px;padding:0 24px;}
        .nav-shell{display:none !important;}
        .modal-ov{align-items:center !important;padding:24px;}
        .modal-card{border-radius:18px !important;max-width:560px !important;}
        .chat-wrap{min-height:100vh;}
        .chat-input-bar{position:sticky;bottom:0;}
      }
      @media(max-width:899px){
        .chat-wrap{min-height:calc(100vh - 60px) !important;}
        .chat-input-bar{position:fixed;bottom:60px;left:0;right:0;z-index:150;}
      }
      @media(max-width:380px){html{font-size:14px;}}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
